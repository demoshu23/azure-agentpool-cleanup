trigger:
  branches:
    include:
      - main

# Load Azure DevOps Library Group
variables:
  - group: azure-agent-pool-catalogue

pool:
  vmImage: ubuntu-latest

steps:
  # Ensure repo is checked out (including repos.txt + script)
  - checkout: self
    fetchDepth: 1

  # Install GitHub CLI + jq
  - script: |
      echo "Installing dependencies..."
      sudo apt-get update -y
      sudo apt-get install -y jq
      if ! command -v gh >/dev/null; then
        sudo apt-get install -y gh
      fi
    displayName: "Install GitHub CLI & jq"

  # Make script executable
  - script: |
      chmod +x cleanup-stale-branches-ghe.sh
    displayName: "Make cleanup script executable"

  # Run cleanup script
  - script: |
      echo "Running stale branch cleanup..."
      ./cleanup-stale-branches-ghe.sh
    displayName: "Execute cleanup-stale-branches-ghe.sh"
    env:
      GHE_API_URL: $(GHE_API_URL)
      GHE_PAT: $(GHE_PAT)
      GHE_ORG: $(GHE_ORG)
      STALE_THRESHOLD: $(STALE_THRESHOLD)
      DRY_RUN: $(DRY_RUN)
